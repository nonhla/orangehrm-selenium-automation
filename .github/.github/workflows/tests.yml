name: OrangeHRM Selenium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests
        run: pytest -v --html=report.html --self-contained-html

      - name: Upload HTML report (includes failure screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: report.html
